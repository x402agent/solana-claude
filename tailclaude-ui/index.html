<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TailSolanaClaude (Cypherpunk Edition)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg: #000000;
  --surface: #0a0f0a;
  --border: #00ff00;
  --text: #00ff00;
  --text-glow: 0 0 5px #00ff00, 0 0 10px #00ff00;
  --muted: #005500;
  --accent: #ff00ff;
  --accent-dim: #990099;
  --user-bg: #001100;
  --assistant-bg: #000a00;
  --code-bg: #001a00;
  --danger: #ff0000;
  --success: #00ff00;
  --warning: #ffff00;
  --info: #00ffff;
  --light-gray: #444444;
  --scanline: rgba(0, 255, 0, 0.05);
}

@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}

html,body{
  height:100%;
  font-family:'Share Tech Mono', 'Courier New', monospace;
  background:var(--bg);
  color:var(--text);
  text-shadow: 0 0 2px var(--text);
}

body::after {
  content: " ";
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 2;
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
}

#app{display:flex;height:100vh;height:100dvh; position: relative; z-index: 3;}

.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .2s ease;box-shadow: 2px 0 10px rgba(0,255,0,0.2);}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:16px;font-weight:600;letter-spacing:-.02em;text-shadow:var(--text-glow);}
.sidebar-header .actions{display:flex;gap:6px;align-items:center}
.sidebar-header span{font-size:11px;color:var(--bg);background:var(--text);padding:2px 8px;border-radius:0px;font-weight:bold;}
.icon-btn{background:none;border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:0px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.icon-btn:hover{color:var(--bg);background:var(--text);box-shadow:var(--text-glow);}
.icon-btn.active{color:var(--accent);border-color:var(--accent);}

.controls{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.control-row{display:flex;gap:8px;align-items:center}
.control-row label{font-size:11px;color:var(--text);min-width:44px;flex-shrink:0}
.control-select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:0px;font-size:12px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;font-family:inherit;}
.control-select:focus{border-color:var(--accent);box-shadow: 0 0 5px var(--accent);}
.pill-group{display:flex;gap:0;flex:1}
.pill{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 4px;font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
.pill:first-child{border-radius:0px;}
.pill:last-child{border-radius:0px;}
.pill:not(:first-child){border-left:none}
.pill.active{background:var(--accent-dim);color:var(--bg);border-color:var(--accent-dim);font-weight:bold;box-shadow: inset 0 0 5px var(--accent);}

.new-chat{margin:0 12px 8px;padding:10px;background:var(--text);color:var(--bg);border:none;border-radius:0px;cursor:pointer;font-size:13px;font-weight:bold;transition:opacity .15s;font-family:inherit;text-transform:uppercase;}
.new-chat:hover{box-shadow:var(--text-glow);}
.new-chat:disabled{opacity:.5;cursor:not-allowed}
.sessions{flex:1;overflow-y:auto;padding:4px 8px}
.session-item{padding:10px 12px;border-radius:0px;cursor:pointer;font-size:13px;color:var(--muted);transition:background .1s;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:8px;border-left: 2px solid transparent;}
.session-item:hover{background:var(--bg);border-left-color:var(--border);}
.session-item.active{background:var(--bg);color:var(--text);border-left-color:var(--accent);box-shadow: inset 20px 0 20px -20px var(--accent);}
.session-item .session-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.session-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .session-meta{font-size:10px;color:var(--muted);opacity:.7}
.session-item .badges{display:flex;gap:4px;flex-shrink:0;align-items:center}
.source-badge{font-size:9px;padding:1px 5px;border-radius:0px;font-weight:600;text-transform:uppercase}
.source-badge.web{background:var(--info);color:var(--bg)}
.source-badge.terminal{background:var(--success);color:var(--bg)}
.tailscale-url{margin:0 12px 12px;padding:8px 10px;background:var(--bg);border-radius:0px;border: 1px dotted var(--text);font-size:11px;color:var(--text);word-break:break-all;display:none;cursor:pointer;position:relative;overflow:hidden}
.tailscale-url.visible{display:block}
.tailscale-url a{color:var(--accent);text-decoration:none;transition:filter .2s ease}
.tailscale-url .url-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--bg);background:var(--text);pointer-events:none;transition:opacity .2s}
.tailscale-url:hover .url-hint{opacity:0}

.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.alert-banner{display:none;padding:8px 16px;background:var(--danger);color:var(--bg);font-size:12px;font-weight:bold;text-align:center;border-bottom:1px solid var(--danger);animation:slideDown .2s ease;font-family:inherit;}
.alert-banner.visible{display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 10px var(--danger);}

.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text);background:var(--surface);}
.hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:0px;line-height:1}
.topbar .session-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:bold;text-transform:uppercase;}
.topbar .badge{padding:2px 10px;border-radius:0px;font-size:11px;font-weight:bold;flex-shrink:0;text-transform:uppercase;}
.topbar .model{background:var(--accent);color:var(--bg)}
.topbar .mode-badge{background:var(--info);color:var(--bg)}
.topbar .effort-badge{background:var(--warning);color:var(--bg)}

.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab-btn{padding:8px 16px;font-size:12px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;text-transform:uppercase;font-weight:bold;}
.tab-btn:hover{color:var(--text);background:var(--bg);border-color:var(--muted);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);text-shadow: 0 0 5px var(--accent);}

.tab-content{display:none;flex:1;overflow-y:auto}
.tab-content.active{display:flex;flex-direction:column}

.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.msg{max-width:720px;width:100%;margin:0 auto;padding:12px 16px;border-radius:0px;border: 1px solid transparent;font-size:14px;line-height:1.65}
.msg.user{background:var(--user-bg);align-self:flex-end;border-color:var(--border);border-right: 4px solid var(--border);}
.msg.assistant{background:var(--assistant-bg);border:1px solid var(--accent);align-self:flex-start;border-left: 4px solid var(--accent);box-shadow:inset 0 0 10px rgba(255,0,255,0.1);}
.msg pre{background:var(--code-bg);padding:12px;border:1px dotted var(--text);overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5;box-shadow:inset 0 0 5px rgba(0,255,0,0.2);}
.msg code{font-family:'Courier New', monospace;}
.msg p+p{margin-top:8px}
.msg ul,.msg ol{margin:4px 0 4px 20px}
.tools-used{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tool-badge{font-size:11px;background:var(--bg);border:1px solid var(--muted);color:var(--text);padding:2px 8px;border-radius:0px;}

.input-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface)}
.input-wrap{max-width:720px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.input-wrap textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:0px;padding:10px 14px;color:var(--text);font-size:16px;font-family:inherit;resize:none;min-height:42px;max-height:200px;line-height:1.5;outline:none;transition:border-color .15s}
.input-wrap textarea:focus{border-color:var(--accent);box-shadow: 0 0 10px rgba(0,255,0,0.5);}
.input-wrap button{border:1px solid var(--border);border-radius:0px;padding:10px 18px;cursor:pointer;font-size:14px;font-weight:bold;transition:opacity .15s;white-space:nowrap;font-family:inherit;text-transform:uppercase;}
.btn-send{background:var(--text);color:var(--bg)}
.btn-stop{background:var(--danger);color:var(--bg);border-color:var(--danger);}
.input-wrap button:hover{box-shadow:var(--text-glow);}

.status-bar{padding:6px 20px;font-size:11px;color:var(--text);border-top:1px solid var(--border);background:var(--bg);display:flex;gap:16px;align-items:center;flex-wrap:wrap;text-transform:uppercase;}
.status-bar .status-left{display:flex;gap:8px;align-items:center}
.status-bar .status-center{flex:1;display:flex;gap:16px;justify-content:center;align-items:center}
.status-bar .status-right{display:flex;gap:8px;align-items:center}

.empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text);padding:20px;text-align:center;}
.empty h2{font-size:24px;color:var(--accent);text-shadow:0 0 10px var(--accent);text-transform:uppercase;letter-spacing:2px;}
.empty p{font-size:14px;}
.empty kbd{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:2px 6px;}

</style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>TAILSOLANACLAUDE</h1>
      <div class="actions">
        <button class="icon-btn" id="qrBtn" title="QR Code">&#9641;</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
        <span>vX.1</span>
      </div>
    </div>
    <div class="controls">
      <div class="control-row">
        <label>MODEL</label>
        <select class="control-select" id="modelSelect">
          <option value="opus" selected>SYS.OPUS</option>
          <option value="sonnet">SYS.SONNET</option>
        </select>
      </div>
      <div class="control-row">
        <label>MODE</label>
        <select class="control-select" id="modeSelect">
          <option value="default" selected>DEFAULT</option>
          <option value="bypassPermissions">ROOT_BYPASS</option>
        </select>
      </div>
    </div>
    <button class="new-chat" id="newChat">INIT CONNECT</button>
    <div class="sessions" id="sessionList"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="menuBtn">&#9776;</button>
      <span class="session-name">TERMINAL: /dev/solana</span>
      <span class="badge model">OPUS</span>
      <span class="badge mode-badge">DEFAULT</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active">Terminal</button>
      <button class="tab-btn">Network</button>
      <button class="tab-btn">Nodes</button>
      <button class="tab-btn">Traces</button>
    </div>
    <div class="tab-content active" id="tab-chat">
      <div class="messages" id="messages">
        <div class="empty">
          <h2>SOLANA OS GATEWAY</h2>
          <p>WARNING: UNAUTHORIZED ACCESS PROHIBITED.</p>
          <p>Establish neural link to Solana network. Type '/' to input query.</p>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="input" placeholder="Execute command..." rows="1"></textarea>
          <button id="send" class="btn-send">TRANSMIT</button>
        </div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-left">
        <span id="statusDot">&#9679;</span>
        <span id="statusText">LINK ESTABLISHED</span>
      </div>
      <div class="status-center">
        <span>CYBERPUNK SECURE CHANNEL</span>
      </div>
      <div class="status-right">
        <span>ENCRYPTED.</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
