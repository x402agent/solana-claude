# fly.toml — SolanaOS MCP Server on Fly.io
# Run: fly launch --config mcp-server/fly.toml

app = "solanaos-mcp"
primary_region = "ord"

[build]
  dockerfile = "mcp-server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
