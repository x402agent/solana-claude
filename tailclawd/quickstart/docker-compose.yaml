# Solana $CLAWD Worker Swarm
#
# Run the iii engine on the host first:
#   iii -c iii-config.yaml
#
# Then: docker compose up --build
#
# Workers connect to iii via host.docker.internal. On Linux (Docker <20.10),
# add: extra_hosts: ["host.docker.internal:host-gateway"]

services:
  client:
    build:
      context: ./workers/client
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
      III_HOST_USER_ID: ${III_HOST_USER_ID:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  compute-worker:
    build:
      context: ./workers/compute-worker
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
      III_HOST_USER_ID: ${III_HOST_USER_ID:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  data-worker:
    build:
      context: ./workers/data-worker
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
      III_HOST_USER_ID: ${III_HOST_USER_ID:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  payment-worker:
    build:
      context: ./workers/payment-worker
      dockerfile: Dockerfile
    environment:
      III_BRIDGE_URL: ws://host.docker.internal:49134
      III_HOST_USER_ID: ${III_HOST_USER_ID:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
